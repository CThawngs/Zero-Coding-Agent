steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/zero-coding-agent:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/zero-coding-agent:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/zero-coding-agent:latest'

  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy zero-coding-agent \
          --image gcr.io/$PROJECT_ID/zero-coding-agent:latest \
          --platform managed \
          --region us-central1 \
          --memory 2Gi \
          --cpu 2 \
          --min-instances 0 \
          --max-instances 3 \
          --concurrency 80 \
          --timeout 600 \
          --set-env-vars "NODE_ENV=production,PORT=8080,DATA_DIR=/app/data" \
          --allow-unauthenticated

images:
  - 'gcr.io/$PROJECT_ID/zero-coding-agent'
